<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CineMatch</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f7f8;
      --panel: #ffffff;
      --border: #e2e2e6;
      --text: #1a1a1e;
      --muted: #6b6b74;
      --accent: #6d4aff;
      --accent-text: #ffffff;
      --user-bubble: #6d4aff;
      --user-text: #ffffff;
      --assistant-bubble: #ffffff;
      --error-bubble: #fdecea;
      --error-text: #7a1f1f;
      --code-bg: #f0f0f3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1e;
        --panel: #232328;
        --border: #34343c;
        --text: #ececef;
        --muted: #9a9aa5;
        --accent: #8a6bff;
        --accent-text: #ffffff;
        --user-bubble: #6d4aff;
        --user-text: #ffffff;
        --assistant-bubble: #2b2b32;
        --error-bubble: #3a2223;
        --error-text: #ff9d9d;
        --code-bg: #1c1c21;
      }
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      /* This page has exactly one scroll container: #chat. Keeping the page
       itself non-scrolling avoids a second, competing scrollbar that can
       make #chat's own scroll-to-bottom feel unreliable. */
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      flex: 0 0 auto;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }

    header p {
      margin: 2px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    #chat {
      flex: 1 1 auto;
      /* Without this, a flex child with overflow:auto can still refuse to
       shrink below the height of its own content (the default min-height:
       auto), which makes long, fully-expanded traces push past the footer
       instead of scrolling internally. min-height:0 forces #chat to respect
       the space actually available and do its own scrolling. */
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 20px;
      /* Extra breathing room below the last turn (trace + action buttons) so
       nothing sits flush against the composer bar when scrolled all the
       way down. */
      padding-bottom: 48px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .turn {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .turn.user {
      align-self: flex-end;
      align-items: flex-end;
    }

    .turn.assistant,
    .turn.error {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      line-height: 1.45;
      font-size: 14.5px;
      white-space: normal;
      word-wrap: break-word;
    }

    .turn.user .bubble {
      background: var(--user-bubble);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .turn.assistant .bubble {
      background: var(--assistant-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .turn.error .bubble {
      background: var(--error-bubble);
      color: var(--error-text);
      border-bottom-left-radius: 4px;
    }

    .bubble code {
      background: var(--code-bg);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
    }

    .trace {
      margin-top: 6px;
      font-size: 12.5px;
      width: 100%;
    }

    .trace>summary {
      cursor: pointer;
      color: var(--muted);
      padding: 4px 0;
      user-select: none;
    }

    .trace .step {
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 6px 0;
      padding: 2px 10px;
      background: var(--panel);
    }

    .trace .step>summary {
      cursor: pointer;
      padding: 6px 2px;
      font-weight: 600;
      color: var(--text);
      user-select: none;
    }

    .trace .step-field {
      margin: 6px 2px 10px;
    }

    .trace .step-field .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 3px;
    }

    .trace pre {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 8px 10px;
      margin: 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 12px;
      max-height: 320px;
      overflow-y: auto;
    }

    .copy-steps-btn {
      display: block;
      margin: 6px 2px 4px;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    .copy-steps-btn:hover {
      filter: brightness(1.05);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .actions button {
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
    }

    .actions button.primary {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
    }

    .actions button:hover {
      filter: brightness(1.05);
    }

    .try-again-box {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .try-again-box input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
    }

    .thinking {
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }

    footer {
      flex: 0 0 auto;
      border-top: 1px solid var(--border);
      background: var(--panel);
      padding: 14px 20px;
    }

    #composer {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 14.5px;
      font-family: inherit;
    }

    #runBtn {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--accent-text);
      font-size: 14.5px;
      font-weight: 600;
      cursor: pointer;
      flex: 0 0 auto;
    }

    #runBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <header>
    <h1>CineMatch</h1>
    <p>Ask for a movie recommendation &mdash; I'll verify it's actually available where you can watch it.</p>
  </header>

  <div id="chat"></div>

  <footer>
    <div id="composer">
      <textarea id="prompt" placeholder="e.g. Slow-burn crime like Sicario, on Netflix in Israel" rows="1"></textarea>
      <button id="runBtn">Run Agent</button>
    </div>
  </footer>

  <script>
    (function () {
      const API_URL = "/api/execute";
      const chatEl = document.getElementById("chat");
      const promptEl = document.getElementById("prompt");
      const runBtn = document.getElementById("runBtn");

      let conversationHistory = [];
      let conversationEnded = false;
      let sessionState = null; // round-tripped excluded/recommended movies (see agent/models.py SessionState)

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // Minimal, safe markdown: escape first, then convert **bold**, `code`, and newlines.
      function renderMarkdown(md) {
        let html = escapeHtml(md ?? "");
        html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
        html = html.replace(/`([^`]+?)`/g, "<code>$1</code>");
        html = html.replace(/\n/g, "<br>");
        return html;
      }

      function el(tag, opts) {
        const node = document.createElement(tag);
        opts = opts || {};
        if (opts.className) node.className = opts.className;
        if (opts.text !== undefined) node.textContent = opts.text;
        if (opts.html !== undefined) node.innerHTML = opts.html;
        return node;
      }

      function scrollToBottom() {
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function addUserTurn(text) {
        const turn = el("div", { className: "turn user" });
        const bubble = el("div", { className: "bubble" });
        bubble.textContent = text;
        turn.appendChild(bubble);
        chatEl.appendChild(turn);
        scrollToBottom();
        return turn;
      }

      function addThinkingTurn() {
        const turn = el("div", { className: "turn assistant" });
        const bubble = el("div", { className: "bubble thinking", text: "Thinking…" });
        turn.appendChild(bubble);
        chatEl.appendChild(turn);
        scrollToBottom();
        return turn;
      }

      function addErrorTurn(message) {
        const turn = el("div", { className: "turn error" });
        const bubble = el("div", { className: "bubble", text: message });
        turn.appendChild(bubble);
        chatEl.appendChild(turn);
        scrollToBottom();
      }

      // Recursively parse any JSON-looking strings (including nested ones) so
      // responses that are themselves stringified JSON render as real objects.
      function deepParseJson(value) {
        if (typeof value === "string") {
          const trimmed = value.trim();
          if ((trimmed.startsWith("{") && trimmed.endsWith("}")) || (trimmed.startsWith("[") && trimmed.endsWith("]"))) {
            try {
              return deepParseJson(JSON.parse(trimmed));
            } catch (e) {
              return value;
            }
          }
          return value;
        }
        if (Array.isArray(value)) return value.map(deepParseJson);
        if (value && typeof value === "object") {
          const out = {};
          for (const k in value) out[k] = deepParseJson(value[k]);
          return out;
        }
        return value;
      }

      function stepFieldBlock(label, value, isPre) {
        if (value === null || value === undefined || value === "") return null;
        const wrap = el("div", { className: "step-field" });
        wrap.appendChild(el("div", { className: "label", text: label }));
        if (isPre) {
          const pre = el("pre");
          const displayValue = deepParseJson(value);
          pre.textContent = typeof displayValue === "string" ? displayValue : JSON.stringify(displayValue, null, 2);
          wrap.appendChild(pre);
        } else {
          wrap.appendChild(el("div", { text: value }));
        }
        return wrap;
      }

      function copyStepsButton(steps) {
        const btn = el("button", { className: "copy-steps-btn", text: "Copy steps as text" });
        btn.addEventListener("click", async () => {
          const text = JSON.stringify(steps, null, 2);
          try {
            await navigator.clipboard.writeText(text);
            const original = btn.textContent;
            btn.textContent = "Copied!";
            setTimeout(() => { btn.textContent = original; }, 1500);
          } catch (e) {
            btn.textContent = "Copy failed";
          }
        });
        return btn;
      }

      function buildTrace(steps) {
        if (!steps || !steps.length) return null;
        const outer = el("details", { className: "trace" });
        outer.appendChild(el("summary", { text: `Show execution trace (${steps.length} step${steps.length === 1 ? "" : "s"})` }));

        steps.forEach((step) => {
          const stepEl = el("details", { className: "step" });
          stepEl.appendChild(el("summary", { text: step.module || "(unknown step)" }));

          const prompt = step.prompt || {};
          const usr = stepFieldBlock("User prompt", prompt.user_prompt, true);
          const resp = stepFieldBlock("Response", step.response, true);
          if (usr) stepEl.appendChild(usr);
          if (resp) stepEl.appendChild(resp);

          outer.appendChild(stepEl);
        });

        outer.appendChild(copyStepsButton(steps));
        return outer;
      }

      function lastStepIsClarification(steps) {
        if (!steps || !steps.length) return false;
        const last = steps[steps.length - 1];
        return typeof last.module === "string" && last.module.endsWith("ask_user_clarification");
      }

      function addAssistantTurn(responseText, steps) {
        const turn = el("div", { className: "turn assistant" });
        const bubble = el("div", { className: "bubble", html: renderMarkdown(responseText) });
        turn.appendChild(bubble);

        const trace = buildTrace(steps);
        if (trace) turn.appendChild(trace);

        chatEl.appendChild(turn);

        const isClarification = lastStepIsClarification(steps);
        if (!isClarification) {
          addSatisfiedTryAgain(turn);
        }

        scrollToBottom();
      }

      function addSatisfiedTryAgain(turn) {
        const actions = el("div", { className: "actions" });

        const satisfiedBtn = el("button", { className: "primary", text: "Satisfied" });
        satisfiedBtn.addEventListener("click", () => {
          actions.remove();
          const doneTurn = el("div", { className: "turn assistant" });
          doneTurn.appendChild(el("div", { className: "bubble", text: "Happy to help — enjoy the movie! \u{1F3AC}" }));
          chatEl.appendChild(doneTurn);
          conversationEnded = true;
          promptEl.disabled = true;
          runBtn.disabled = true;
          promptEl.placeholder = "Conversation ended.";
          scrollToBottom();
        });

        const tryAgainBtn = el("button", { text: "Try again" });
        tryAgainBtn.addEventListener("click", () => {
          actions.remove();
          const box = el("div", { className: "try-again-box" });
          const input = el("input");
          input.type = "text";
          input.placeholder = "What was wrong?";
          const sendBtn = el("button", { className: "primary", text: "Send" });

          function submit() {
            const val = input.value.trim();
            if (!val) return;
            box.remove();
            runAgent(val);
          }
          sendBtn.addEventListener("click", submit);
          input.addEventListener("keydown", (e) => {
            if (e.key === "Enter") submit();
          });

          box.appendChild(input);
          box.appendChild(sendBtn);
          turn.appendChild(box);
          input.focus();
          scrollToBottom();
        });

        actions.appendChild(satisfiedBtn);
        actions.appendChild(tryAgainBtn);
        turn.appendChild(actions);
      }

      async function runAgent(text) {
        if (conversationEnded) return;
        const trimmed = (text || "").trim();
        if (!trimmed) return;

        addUserTurn(trimmed);
        promptEl.value = "";
        promptEl.disabled = true;
        runBtn.disabled = true;
        const thinkingTurn = addThinkingTurn();

        let data;
        try {
          const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: trimmed,
              conversation_history: conversationHistory,
              prior_state: sessionState,
            }),
          });
          data = await res.json();
        } catch (err) {
          thinkingTurn.remove();
          addErrorTurn("Network error: could not reach the agent. Please try again.");
          promptEl.disabled = false;
          runBtn.disabled = false;
          promptEl.focus();
          return;
        }

        thinkingTurn.remove();

        if (!data || data.status !== "ok") {
          addErrorTurn((data && data.error) || "The agent failed to process this request.");
          promptEl.disabled = false;
          runBtn.disabled = false;
          promptEl.focus();
          return;
        }

        conversationHistory.push({ role: "user", content: trimmed });
        conversationHistory.push({ role: "assistant", content: data.response || "" });
        sessionState = data.state || sessionState;

        addAssistantTurn(data.response || "", data.steps || []);

        if (!conversationEnded) {
          promptEl.disabled = false;
          runBtn.disabled = false;
          promptEl.focus();
        }
      }

      runBtn.addEventListener("click", () => runAgent(promptEl.value));
      promptEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          runAgent(promptEl.value);
        }
      });
      promptEl.addEventListener("input", () => {
        promptEl.style.height = "auto";
        promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + "px";
      });
    })();
  </script>
</body>

</html>
